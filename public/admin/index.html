<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CoinSense — Admin</title>
  <meta name="robots" content="noindex, nofollow" />

  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%AA%99%3C/text%3E%3C/svg%3E" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />

  <script src="https://cdn.jsdelivr.net/npm/marked@14.1.3/marked.min.js"></script>
</head>
<body class="min-h-screen bg-[#0a0a0a] text-white font-sans antialiased">
  <div class="min-h-screen flex flex-col">

    <header class="border-b border-white/10 px-6 py-4">
      <div class="max-w-6xl mx-auto flex items-center justify-between">
        <div class="flex items-center gap-3">
          <span class="text-lg font-semibold tracking-tight">CoinSense</span>
          <span class="text-xs font-mono text-white/40 px-2 py-0.5 rounded-full border border-white/10">admin</span>
        </div>
        <nav class="flex gap-1 text-sm font-mono">
          <button data-tab="contacts" class="tab-btn px-3 py-1.5 rounded-md text-white/60 hover:text-white hover:bg-white/5">Contacts</button>
          <button data-tab="compose" class="tab-btn px-3 py-1.5 rounded-md text-white/60 hover:text-white hover:bg-white/5">Compose</button>
          <button data-tab="history" class="tab-btn px-3 py-1.5 rounded-md text-white/60 hover:text-white hover:bg-white/5">History</button>
        </nav>
        <button id="logout" class="text-xs font-mono text-white/40 hover:text-white/70">Sign out</button>
      </div>
    </header>

    <main class="flex-1 px-6 py-8">
      <div class="max-w-6xl mx-auto">

        <section id="tab-contacts" class="tab-panel hidden">
          <div class="flex items-center justify-between mb-6">
            <h2 class="text-2xl font-semibold">Contacts</h2>
            <div class="text-xs font-mono text-white/40" id="contacts-count"></div>
          </div>
          <div class="rounded-lg border border-white/10 overflow-hidden">
            <table class="w-full text-sm">
              <thead class="bg-white/5 text-xs font-mono text-white/50 uppercase tracking-wider">
                <tr>
                  <th class="text-left px-4 py-2">Email</th>
                  <th class="text-left px-4 py-2">Added</th>
                  <th class="text-left px-4 py-2">Status</th>
                  <th class="text-right px-4 py-2"></th>
                </tr>
              </thead>
              <tbody id="contacts-tbody"></tbody>
            </table>
          </div>
        </section>

        <section id="tab-compose" class="tab-panel hidden">
          <h2 class="text-2xl font-semibold mb-6">Compose broadcast</h2>
          <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

            <div class="space-y-4">
              <div>
                <label class="block text-xs font-mono text-white/50 uppercase tracking-wider mb-1">Subject</label>
                <input id="compose-subject" type="text" class="w-full px-3 py-2 rounded-md bg-white/5 border border-white/10 text-white focus:outline-none focus:border-green-500/50" />
              </div>
              <div>
                <label class="block text-xs font-mono text-white/50 uppercase tracking-wider mb-1">Preview text</label>
                <input id="compose-preview" type="text" class="w-full px-3 py-2 rounded-md bg-white/5 border border-white/10 text-white focus:outline-none focus:border-green-500/50" />
              </div>
              <div>
                <label class="block text-xs font-mono text-white/50 uppercase tracking-wider mb-1">Body (Markdown)</label>
                <textarea id="compose-body" rows="16" class="w-full px-3 py-2 rounded-md bg-white/5 border border-white/10 text-white font-mono text-sm focus:outline-none focus:border-green-500/50" placeholder="Write in Markdown. Use {{{RESEND_UNSUBSCRIBE_URL}}} for the unsubscribe link, {{{contact.first_name|there}}} for first name."></textarea>
              </div>

              <div class="flex flex-wrap gap-2 pt-2">
                <button id="compose-test" class="px-4 py-2 rounded-md bg-white/10 hover:bg-white/15 text-sm font-medium">Send test to me</button>
                <button id="compose-save" class="px-4 py-2 rounded-md bg-white/10 hover:bg-white/15 text-sm font-medium">Save as draft</button>
                <div class="flex-1"></div>
                <input id="compose-schedule" type="datetime-local" class="px-3 py-2 rounded-md bg-white/5 border border-white/10 text-sm font-mono" />
                <button id="compose-send" class="px-4 py-2 rounded-md bg-green-500 hover:bg-green-400 text-black font-semibold text-sm">Schedule send</button>
              </div>
              <p class="text-xs font-mono text-white/40" id="compose-status">Draft unsaved.</p>
            </div>

            <div>
              <label class="block text-xs font-mono text-white/50 uppercase tracking-wider mb-1">Preview</label>
              <iframe id="compose-preview-frame" class="w-full h-[600px] rounded-md bg-white" sandbox="allow-same-origin"></iframe>
            </div>

          </div>
        </section>

        <section id="tab-history" class="tab-panel hidden">
          <h2 class="text-2xl font-semibold mb-6">History</h2>
          <div class="rounded-lg border border-white/10 overflow-hidden">
            <table class="w-full text-sm">
              <thead class="bg-white/5 text-xs font-mono text-white/50 uppercase tracking-wider">
                <tr>
                  <th class="text-left px-4 py-2">Subject</th>
                  <th class="text-left px-4 py-2">Status</th>
                  <th class="text-left px-4 py-2">Sent</th>
                  <th class="text-right px-3 py-2">Delivered</th>
                  <th class="text-right px-3 py-2">Opened</th>
                  <th class="text-right px-3 py-2">Clicked</th>
                  <th class="text-right px-3 py-2">Bounced</th>
                </tr>
              </thead>
              <tbody id="history-tbody"></tbody>
            </table>
          </div>
        </section>

      </div>
    </main>

    <div id="toast" class="fixed bottom-6 right-6 hidden px-4 py-2 rounded-md text-sm font-mono border z-50"></div>
  </div>

  <script src="/admin/admin.js"></script>
</body>
</html>
